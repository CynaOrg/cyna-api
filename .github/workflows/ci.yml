name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # TODO: enable lint after migrating to eslint.config.js (ESLint 9)
      # - name: Lint
      #   run: npm run lint

      - name: Test with coverage
        run: npm run test:cov

      - name: Build
        run: npm run build
