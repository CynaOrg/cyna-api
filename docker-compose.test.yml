services:
  redis-test:
    image: redis:7-alpine
    container_name: cyna-redis-test
    ports:
      - '6380:6379'
    command: redis-server --requirepass test_password --appendonly no
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'test_password', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
